<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fear VDF History</title>
    <link rel="icon" type="image/webp" href="/favicon.webp">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .glass-panel {
            background: rgba(22, 22, 26, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .grid-bg {
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(circle at 0 0, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at 0 0, black 40%, transparent 80%);
        }
        body { scrollbar-width: thin; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    </style>
</head>
<body class="text-white min-h-screen w-full relative overflow-x-hidden selection:bg-[#5865F2] selection:text-white">
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute inset-0 grid-bg"></div>
        <div class="absolute -top-[200px] -left-[200px] w-[600px] h-[600px] bg-[#5865F2] rounded-full blur-[120px] opacity-[0.07]"></div>
    </div>

    <div class="relative z-10 max-w-7xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <i class="ph ph-files text-[#5865F2]"></i>
                    История VDF-проверок
                </h1>
                <p class="text-gray-500 text-sm mt-1" id="meta"></p>
            </div>
            <a href="/" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-sm font-medium transition-colors flex items-center gap-2">
                <i class="ph ph-arrow-left"></i> Назад
            </a>
        </div>

        <div class="glass-panel rounded-xl p-4 mb-4">
            <div class="flex items-center gap-3">
                <i class="ph ph-magnifying-glass text-gray-500"></i>
                <input type="text" id="searchInput" placeholder="Поиск по SteamID, нику, причине..."
                    class="bg-transparent border-none outline-none text-white text-sm w-full placeholder-gray-500">
                <button id="searchBtn" class="px-3 py-1.5 rounded-lg bg-[#5865F2]/20 hover:bg-[#5865F2]/30 text-[#a5b4fc] text-xs font-semibold border border-[#5865F2]/30 transition-colors flex items-center gap-1">
                    <i class="ph ph-magnifying-glass"></i> Найти
                </button>
                <button id="resetBtn" class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-gray-400 text-xs font-semibold border border-white/10 transition-colors flex items-center gap-1">
                    <i class="ph ph-x"></i> Сброс
                </button>
            </div>
        </div>

        <div class="overflow-x-auto rounded-xl border border-white/10 bg-white/[0.03]">
            <table class="w-full text-left text-sm">
                <thead class="bg-white/5 text-gray-400">
                    <tr>
                        <th class="px-4 py-3 font-semibold">#</th>
                        <th class="px-4 py-3 font-semibold">Дата</th>
                        <th class="px-4 py-3 font-semibold">SteamID</th>
                        <th class="px-4 py-3 font-semibold">Ник</th>
                        <th class="px-4 py-3 font-semibold">Fear</th>
                        <th class="px-4 py-3 font-semibold">VAC</th>
                        <th class="px-4 py-3 font-semibold">Yooma</th>
                        <th class="px-4 py-3 font-semibold">Причина</th>
                        <th class="px-4 py-3 font-semibold">Файл</th>
                    </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
        </div>

        <div class="flex items-center justify-between mt-4">
            <div id="status" class="text-sm text-gray-500"></div>
            <div id="pagination" class="flex items-center gap-2"></div>
        </div>
    </div>

    <script>
        fetch("/api/auth/me").then(function(r) {
          if (r.status === 401) window.location.href = "/login";
        }).catch(function() {});
    </script>
    <script src="/vdf.js"></script>
</body>
</html>

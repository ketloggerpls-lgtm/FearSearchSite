<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fear Staff Sync — Login</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .glass-panel { background: rgba(22, 22, 26, 0.9); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .grid-bg { background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 32px 32px; mask-image: radial-gradient(circle at 0 0, black 40%, transparent 80%); -webkit-mask-image: radial-gradient(circle at 0 0, black 40%, transparent 80%); }
        .form-hidden { display: none; }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center relative overflow-hidden">
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute inset-0 grid-bg"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#5865F2] rounded-full blur-[120px] opacity-[0.07]"></div>
    </div>
    <div class="relative z-10 w-full max-w-sm px-4">
        <div class="glass-panel rounded-2xl p-8">
            <div class="text-center mb-6">
                <h1 class="text-xl font-bold flex items-center justify-center gap-2">
                    <span class="text-[#5865F2] text-2xl">&#x1F6E1;</span> Fear Staff Sync
                </h1>
                <p id="formTitle" class="text-gray-500 text-sm mt-1">Вход в панель стаффа</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 font-medium mb-1 block">Логин</label>
                    <input type="text" id="username" required autocomplete="username"
                        class="w-full px-3 py-2.5 rounded-lg bg-white/5 border border-white/10 text-white text-sm outline-none focus:border-[#5865F2] transition-colors placeholder-gray-600"
                        placeholder="Введите логин">
                </div>
                <div>
                    <label class="text-xs text-gray-400 font-medium mb-1 block">Пароль</label>
                    <input type="password" id="password" required autocomplete="current-password"
                        class="w-full px-3 py-2.5 rounded-lg bg-white/5 border border-white/10 text-white text-sm outline-none focus:border-[#5865F2] transition-colors placeholder-gray-600"
                        placeholder="Введите пароль">
                </div>
                <div id="error" class="text-rose-400 text-sm text-center hidden"></div>
                <div id="success" class="text-emerald-400 text-sm text-center hidden"></div>
                <button type="submit" id="submitBtn"
                    class="w-full py-2.5 rounded-lg bg-[#5865F2] hover:bg-[#4752C4] text-sm font-semibold transition-colors">
                    Войти
                </button>
            </form>

            <p class="text-gray-500 text-xs text-center mt-4">
                <span id="toggleText">Нет аккаунта?</span>
                <button id="toggleBtn" class="text-[#5865F2] hover:underline font-medium ml-1">Зарегистрироваться</button>
            </p>
        </div>
    </div>
    <script>
        const loginForm = document.getElementById("loginForm");
        const formTitle = document.getElementById("formTitle");
        const toggleText = document.getElementById("toggleText");
        const toggleBtn = document.getElementById("toggleBtn");
        const submitBtn = document.getElementById("submitBtn");
        const errEl = document.getElementById("error");
        const successEl = document.getElementById("success");
        let isRegister = false;

        toggleBtn.addEventListener("click", function() {
            isRegister = !isRegister;
            errEl.classList.add("hidden");
            successEl.classList.add("hidden");
            if (isRegister) {
                formTitle.textContent = "Регистрация";
                submitBtn.textContent = "Зарегистрироваться";
                toggleText.textContent = "Уже есть аккаунт?";
                toggleBtn.textContent = "Войти";
            } else {
                formTitle.textContent = "Вход в панель стаффа";
                submitBtn.textContent = "Войти";
                toggleText.textContent = "Нет аккаунта?";
                toggleBtn.textContent = "Зарегистрироваться";
            }
        });

        loginForm.addEventListener("submit", async function(e) {
            e.preventDefault();
            errEl.classList.add("hidden");
            successEl.classList.add("hidden");
            try {
                const url = isRegister ? "/api/auth/register" : "/api/auth/login";
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: document.getElementById("username").value,
                        password: document.getElementById("password").value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Ошибка");
                if (isRegister) {
                    successEl.textContent = "Аккаунт создан! Теперь войдите.";
                    successEl.classList.remove("hidden");
                    isRegister = false;
                    formTitle.textContent = "Вход в панель стаффа";
                    submitBtn.textContent = "Войти";
                    toggleText.textContent = "Нет аккаунта?";
                    toggleBtn.textContent = "Зарегистрироваться";
                } else {
                    window.location.href = "/";
                }
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.remove("hidden");
            }
        });
    </script>
</body>
</html>

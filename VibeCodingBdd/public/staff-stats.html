<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика стаффа — Fear Staff Sync</title>
    <link rel="icon" type="image/webp" href="/favicon.webp">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .glass-panel { background: rgba(22, 22, 26, 0.9); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .grid-bg { background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 32px 32px; mask-image: radial-gradient(circle at 0 0, black 40%, transparent 80%); -webkit-mask-image: radial-gradient(circle at 0 0, black 40%, transparent 80%); }
        body { scrollbar-width: thin; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        .role-header { border-left: 3px solid; padding-left: 12px; }
        .view-btn { transition: all 0.2s; }
        .view-btn.active { background: rgba(88, 101, 242, 0.2); border-color: rgba(88, 101, 242, 0.5); color: #818cf8; }
        .period-btn { transition: all 0.15s; }
        .period-btn.active { background: rgba(88, 101, 242, 0.2); color: #818cf8; border-color: rgba(88, 101, 242, 0.4); }
        .period-btn:not(.active) { color: #9ca3af; }
        .period-btn:hover:not(.active) { color: #e5e7eb; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="text-white min-h-screen w-full relative overflow-x-hidden">
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute inset-0 grid-bg"></div>
        <div class="absolute -top-[200px] -left-[200px] w-[600px] h-[600px] bg-[#5865F2] rounded-full blur-[120px] opacity-[0.07]"></div>
    </div>
    <div class="relative z-10 max-w-[1000px] mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-4">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="ph ph-chart-bar text-[#5865F2]"></i>
                    Статистика стаффа
                </h1>
                <p id="periodLabel" class="text-gray-500 text-xs mt-1"></p>
                <p id="totalText" class="text-gray-600 text-xs mt-0.5"></p>
            </div>
            <div class="flex items-center gap-2">
                <a href="/" class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-xs font-medium transition-colors flex items-center gap-1.5">
                    <i class="ph ph-arrow-left"></i> Назад
                </a>
                <button id="refreshBtn" class="px-3 py-1.5 rounded-lg bg-[#5865F2] hover:bg-[#4752C4] text-xs font-semibold transition-colors flex items-center gap-1.5">
                    <i class="ph ph-arrows-clockwise"></i>
                </button>
            </div>
        </div>

        <div class="flex items-center gap-1.5 mb-4 flex-wrap">
            <button class="period-btn active px-3 py-1.5 rounded-lg text-xs font-medium border border-white/10" data-period="this-month">Этот месяц</button>
            <button class="period-btn px-3 py-1.5 rounded-lg text-xs font-medium border border-white/10" data-period="last-month">Прошлый месяц</button>
            <button class="period-btn px-3 py-1.5 rounded-lg text-xs font-medium border border-white/10" data-period="this-week">Эта неделя (Пн–Вс)</button>
            <button class="period-btn px-3 py-1.5 rounded-lg text-xs font-medium border border-white/10" data-period="last-week">Прошлая неделя</button>
            <button class="period-btn px-3 py-1.5 rounded-lg text-xs font-medium border border-white/10" data-period="all">Все время</button>
        </div>

        <div class="flex items-center gap-2 mb-4">
            <div class="flex items-center gap-1 p-1 rounded-lg bg-white/5 border border-white/10">
                <button id="viewGrouped" class="view-btn active px-3 py-1.5 rounded-md text-xs font-medium border border-transparent">
                    <i class="ph ph-users mr-1"></i>По ролям
                </button>
                <button id="viewTop" class="view-btn px-3 py-1.5 rounded-md text-xs font-medium text-gray-400 border border-transparent">
                    <i class="ph ph-trophy mr-1"></i>Топ
                </button>
            </div>
        </div>

        <div id="loading" class="text-center text-gray-500 py-12">Загрузка...</div>
        <div id="content" class="hidden space-y-6"></div>
        <div id="empty" class="hidden text-center text-gray-500 py-12">Нет данных за этот период</div>
    </div>
    <script>
        fetch("/api/auth/me").then(function(r) {
          if (r.status === 401) window.location.href = "/login";
        }).catch(function() {});

        function esc(s) { return String(s||"").replace(/[&<>"']/g, function(c) { return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]; }); }

        var ROLE_COLORS = {
            "Владелец": "#ff3c3c", "Куратор": "#ff8c00", "Разработчик": "#3a84c8",
            "Гл. Администратор": "#f95dff", "Ст. Администратор": "#22c7aa",
            "Спец. Администратор": "#d39ae1", "Ст. Модератор": "#8c56f0",
            "Модератор": "#e75288", "Мл. Модератор": "#e2bb6d",
            "Модератор Discord": "#bd458c", "Модератор месяца": "#da5f23",
            "Администратор": "#ebc04e", "Администратор +": "#ffcc00", "Стафф": "#eab308"
        };
        function getRoleColor(role) { return ROLE_COLORS[role] || "#6b7280"; }

        var cachedData = null;
        var currentView = "grouped";
        var currentPeriod = "this-month";

        function copyToClipboard(text, el) {
            navigator.clipboard.writeText(text).then(function() {
                var orig = el.textContent;
                el.textContent = "Скопировано!";
                el.style.color = "#22c55e";
                setTimeout(function() { el.textContent = orig; el.style.color = ""; }, 1000);
            });
        }

        function getPeriodParams(period) {
            var now = new Date();
            var from, to;
            switch(period) {
                case "this-month":
                    from = new Date(now.getFullYear(), now.getMonth(), 1); to = now; break;
                case "last-month":
                    from = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                    to = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59); break;
                case "this-week": {
                    var day = now.getDay(); var diff = day === 0 ? 6 : day - 1;
                    from = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diff);
                    from.setHours(0, 0, 0, 0); to = now; break;
                }
                case "last-week": {
                    var day2 = now.getDay(); var diff2 = day2 === 0 ? 6 : day2 - 1;
                    from = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diff2 - 7);
                    from.setHours(0, 0, 0, 0);
                    to = new Date(from.getTime() + 7 * 86400000 - 1); break;
                }
                case "all": from = new Date(2020, 0, 1); to = now; break;
                default: from = new Date(now.getFullYear(), now.getMonth(), 1); to = now;
            }
            return { from: from.toISOString(), to: to.toISOString() };
        }

        function formatPeriodLabel(period) {
            var p = getPeriodParams(period);
            return new Date(p.from).toLocaleDateString("ru-RU") + " — " + new Date(p.to).toLocaleDateString("ru-RU");
        }

        function renderRow(s, idx) {
            var fearUrl = "https://fearproject.ru/profile/" + s.steamid;
            var color = getRoleColor(s.role_label);
            return '<div class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-white/[0.03] hover:bg-white/[0.06] transition-colors">'
                + '<span class="text-gray-600 text-sm font-mono w-5 text-right">' + idx + ".</span>"
                + '<div class="flex-1 min-w-0">'
                + '<span class="text-white font-medium text-sm">' + esc(s.name || s.steamid) + "</span>"
                + '<a href="' + fearUrl + '" target="_blank" class="text-gray-500 text-xs ml-2 font-mono hover:text-[#5865F2] transition-colors" title="Профиль Fear">' + esc(s.steamid) + ' <i class="ph ph-link-simple text-[10px]"></i></a>'
                + '<span class="text-gray-700 text-xs ml-1 font-mono cursor-pointer hover:text-gray-400" onclick="copyToClipboard(\'' + s.steamid + '\', this)" title="Скопировать SteamID"><i class="ph ph-copy text-[11px]"></i></span>'
                + (s.role_label ? '<span class="text-xs ml-2 px-1.5 py-0.5 rounded" style="background:' + color + '20;color:' + color + '">' + esc(s.role_label) + '</span>' : '')
                + "</div>"
                + '<div class="flex items-center gap-3 text-xs shrink-0">'
                + '<span title="Баны"><span class="text-gray-500"><i class="ph ph-hammer"></i></span> <span class="text-amber-400 font-semibold">' + (s.bans||0) + "</span></span>"
                + '<span title="Муты"><span class="text-gray-500"><i class="ph ph-megaphone"></i></span> <span class="text-purple-400 font-semibold">' + (s.mutes||0) + "</span></span>"
                + '<span title="Всего"><span class="text-gray-500"><i class="ph ph-chart-line"></i></span> <span class="text-white font-semibold">' + (s.total||0) + "</span></span>"
                + '<span title="Снято"><span class="text-gray-500"><i class="ph ph-scissors"></i></span> <span class="text-gray-400 font-semibold">' + (s.removed||0) + "</span></span>"
                + "</div></div>";
        }

        function renderGrouped(data) {
            var content = document.getElementById("content");
            content.innerHTML = "";
            content.classList.remove("hidden");

            var groups = {};
            (data.staff || []).forEach(function(s) {
                var key = s.role_label || "Стафф";
                if (!groups[key]) groups[key] = { label: key, role_order: s.role_order || 99, members: [] };
                groups[key].members.push(s);
            });

            var sorted = Object.values(groups).sort(function(a, b) { return a.role_order - b.role_order; });
            var idx = 1;
            sorted.forEach(function(g) {
                var color = getRoleColor(g.label);
                var section = document.createElement("div");
                var headerHtml = '<div class="role-header mb-3" style="border-color:' + color + '">'
                    + '<h2 class="text-base font-bold" style="color:' + color + '">' + esc(g.label) + '</h2>'
                    + '<span class="text-gray-600 text-xs">' + g.members.length + ' чел.</span></div>';
                var listHtml = '<div class="space-y-1">';
                g.members.forEach(function(s) {
                    listHtml += renderRow(s, idx);
                    idx++;
                });
                listHtml += "</div>";
                section.innerHTML = headerHtml + listHtml;
                content.appendChild(section);
            });
        }

        function renderTop(data) {
            var content = document.getElementById("content");
            content.innerHTML = "";
            content.classList.remove("hidden");
            var all = (data.staff || []).slice().sort(function(a,b) { return (b.total||0) - (a.total||0); });
            var listHtml = '<div class="space-y-1">';
            all.forEach(function(s, i) { listHtml += renderRow(s, i + 1); });
            listHtml += "</div>";
            content.innerHTML = listHtml;
        }

        function render() {
            if (!cachedData) return;
            if (currentView === "grouped") renderGrouped(cachedData);
            else renderTop(cachedData);
        }

        function loadStats() {
            document.getElementById("loading").classList.remove("hidden");
            document.getElementById("empty").classList.add("hidden");
            document.getElementById("content").classList.add("hidden");
            var params = getPeriodParams(currentPeriod);
            var url = "/api/staff-stats?from=" + encodeURIComponent(params.from) + "&to=" + encodeURIComponent(params.to);
            document.getElementById("periodLabel").textContent = formatPeriodLabel(currentPeriod);
            fetch(url).then(function(r){return r.json()}).then(function(data) {
                document.getElementById("loading").classList.add("hidden");
                if (!data.grouped || Object.keys(data.grouped).length === 0) {
                    document.getElementById("empty").classList.remove("hidden");
                    return;
                }
                document.getElementById("totalText").textContent = (data.staff ? data.staff.length : 0) + " чел.";
                cachedData = data;
                render();
            }).catch(function(err) {
                document.getElementById("loading").textContent = "Ошибка: " + err.message;
            });
        }

        document.querySelectorAll(".period-btn").forEach(function(btn) {
            btn.addEventListener("click", function() {
                document.querySelectorAll(".period-btn").forEach(function(b) { b.classList.remove("active"); });
                btn.classList.add("active");
                currentPeriod = btn.dataset.period;
                loadStats();
            });
        });

        document.getElementById("viewGrouped").addEventListener("click", function() {
            currentView = "grouped"; this.classList.add("active");
            document.getElementById("viewTop").classList.remove("active"); render();
        });
        document.getElementById("viewTop").addEventListener("click", function() {
            currentView = "top"; this.classList.add("active");
            document.getElementById("viewGrouped").classList.remove("active"); render();
        });
        document.getElementById("refreshBtn").addEventListener("click", loadStats);
        loadStats();
    </script>
</body>
</html>
